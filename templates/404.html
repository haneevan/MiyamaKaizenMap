<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Kaizen Portal</title>
    <!-- Link to your existing style.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Specific tweaks to center the 404 message over the office background */
        .error-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Matches your popup style */
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            margin: 0 auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: #1e293b; /* slate-800 */
            font-weight: 800;
        }

        p {
            color: #64748b; /* slate-500 */
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .btn-home {
            display: inline-block;
            background-color: #2563eb; /* Blue-600 */
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-home:hover {
            background-color: #1d4ed8; /* Blue-700 */
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="login-bg"> <!-- Uses your office.jpg background and fadeIn animation -->

    <div class="error-container">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; color: #f97316; margin-bottom: 1rem;"></i>
        <h1>404 Error</h1>
        <p>申し訳ありません。<br>お探しのページは見つかりませんでした。</p>
        
        <a href="{{ url_for('index') }}" class="btn-home">
            ダッシュボードに戻る
        </a>
    </div>

</body>
</html>
