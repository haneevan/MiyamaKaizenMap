<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン | ミヤマ改善ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="login-bg flex items-center justify-center min-h-screen">
    
    <div class="bg-white/70 backdrop-blur-md rounded-2xl shadow-2xl w-96 overflow-hidden border border-white/20">
        
        <div class="p-8 pb-6">
            <div class="flex flex-col items-center mb-8">
                <div class="h-140 w-160 flex items-center justify-center text-white text-xl mb-3 margin-bottom-1">
                    <img src="/static/resource/PicIcon/upscaled no-bg.png" alt="Miyama Seikou Logo" class="h-10 w-auto" width="160" height="40">
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">ログイン</h2>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-bold">ミヤマ改善ポータルへようこそ！</p>
            </div>
            
            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1 ml-1">社員番号 (ID)</label>
                    <input type="text" 
                           name="username" 
                           placeholder="社員番号を入力してください" 
                           required 
                           class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder:text-slate-300">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wide mb-1 ml-1">パスワード (Password)</label>
                    <input type="password" 
                           name="password" 
                           placeholder="••••••••" 
                           required 
                           class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-100 active:scale-95">
                    ログイン (Sign In)
                </button>
            </form>

            <div class="mt-6 flex items-center justify-between px-1">
                <a href="/register" class="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition-colors">
                    <i class="fa-solid fa-user-plus mr-1"></i> 新規登録 <span class="font-normal text-slate-400">(Join)</span>
                </a>
                <a href="mailto:admin@miyama-seikou.co.jp" class="text-[11px] font-bold text-slate-500 hover:text-slate-700 transition-colors">
                    管理者へ連絡 <i class="fa-solid fa-envelope ml-1"></i>
                </a>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="mt-4 p-3 bg-red-50 border border-red-100 rounded-lg">
                      <p class="text-red-500 text-xs text-center font-medium">{{ message }}</p>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <div class="bg-slate-800/5 py-4 border-t border-slate-200/40 text-center">
            <p class="text-slate-400 text-[9px] font-bold uppercase tracking-[0.2em]">© 2026 ミヤマ改善ポータル</p>
        </div>

    </div>
</body>
</html>
